name: Daily data refresh

# Re-scrapes Flipkart once a day and commits the refreshed snapshot. The commit
# auto-redeploys the app on Streamlit Cloud, so the live catalog stays current.
on:
  schedule:
    - cron: "30 1 * * *"   # 01:30 UTC ≈ 07:00 IST, daily
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Scrape Flipkart (keep last good snapshot if blocked)
        run: python -m etl.scrape --pages 20 --min-rows 1000

      - name: Rebuild catalog (sanity check)
        run: python -m etl.pipeline

      - name: Commit refreshed snapshot
        run: |
          git config user.name "parth mishra"
          git config user.email "parthmishra2504@gmail.com"
          git add data/flipkart_electronics_raw.csv
          git diff --staged --quiet || git commit -m "chore: daily data refresh [skip ci]"
          git push
