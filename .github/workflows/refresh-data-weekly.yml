name: Weekly data refresh (deep)

# Deep weekly scrape (more pages) to pick up genuinely new products. The upsert
# merges these into the same snapshot the daily shallow run maintains.
on:
  schedule:
    - cron: "30 18 * * 0"   # 18:30 UTC Sunday = 00:00 IST Monday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Scrape Flipkart — deep (keep last good snapshot if blocked)
        run: python -m etl.scrape --pages 20 --min-rows 1000

      - name: Rebuild catalog (sanity check)
        run: python -m etl.pipeline

      - name: Commit refreshed snapshot
        run: |
          git config user.name "parth mishra"
          git config user.email "parthmishra2504@gmail.com"
          git add data/flipkart_electronics_raw.csv
          git diff --staged --quiet || git commit -m "chore: weekly deep data refresh [skip ci]"
          git push
