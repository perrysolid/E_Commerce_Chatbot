name: Daily data refresh (shallow)

# Shallow daily scrape (top pages, where prices/ratings actually move). The
# upsert merges updates into the snapshot; the weekly deep scrape adds new items.
# An unchanged scrape produces an identical CSV -> no commit -> no redeploy.
on:
  schedule:
    - cron: "30 18 * * *"   # 18:30 UTC = 00:00 IST (midnight), daily
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Scrape Flipkart — shallow (keep last good snapshot if blocked)
        run: python -m etl.scrape --pages 5 --min-rows 300

      - name: Rebuild catalog (sanity check)
        run: python -m etl.pipeline

      - name: Commit refreshed snapshot
        run: |
          git config user.name "parth mishra"
          git config user.email "parthmishra2504@gmail.com"
          git add data/flipkart_electronics_raw.csv
          git diff --staged --quiet || git commit -m "chore: daily shallow data refresh [skip ci]"
          git push
