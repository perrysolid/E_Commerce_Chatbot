[tool.ruff]
line-length = 100
target-version = "py39"
extend-exclude = ["web-scrapping", "*.ipynb"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.per-file-ignores]
# sys.path is set before imports so the app can build its own DB on first run.
"app/main.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
